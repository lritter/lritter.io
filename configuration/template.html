<!doctype html>
<html lang="en">
  <head>
    <title>{weblog-title}{separator}{post-title}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {feeds}

    <!-- probe: subtitle={subtitle} -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://raw.githack.com/lritter/lritter.io/main/assets/noaa-minimal.css"
    />
  </head>

  <body>
    <div class="container">
      <header>
        <h1 class="weblog-title"><a href="{base-path}">{weblog-title}</a></h1>
        {navigation}
      </header>

      <main>
        <article>
          {body}
          <aside class="post-info">
            <i class="fa-solid fa-clock"></i> {date}
          </aside>
          <aside class="post-tags">{tags}</aside>
        </article>
      </main>

      <footer>
        <div class="rev-stamp">
          <span>lritter.io</span>
          <span>Brooklyn, NY</span>
          <span>Rev. May 2026</span>
        </div>
        <a
          rel="me"
          href="https://social.lol/@lritter"
          style="visibility: hidden"
          >Mastodon</a
        >
      </footer>
    </div>
  </body>
</html>
